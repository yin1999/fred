version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    groups:
      npm-prod:
        dependency-type: production
        update-types:
          - minor
          - patch
        exclude-patterns:
          - "@mdn/*"
      npm-dev:
        dependency-type: development
        update-types:
          - minor
          - patch
        exclude-patterns:
          - "@mdn/*"
      codemirror:
        patterns:
          - "@codemirror/*"
        update-types:
          - major
      eslint:
        patterns:
          - "@eslint/*"
          - "eslint"
        update-types:
          - major
      rspack:
        patterns:
          - "@rspack/*"
        update-types:
          - major
      wdio:
        patterns:
          - "@wdio/*"
        update-types:
          - major
    commit-message:
      prefix: chore
      prefix-development: build
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
      include: scope
